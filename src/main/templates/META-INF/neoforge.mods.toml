side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="journeymap"
type="required"
reason="Immersive Deposit Scanner uses JourneyMap for all map visualization."
versionRange="[1.21.1-6.0.0-beta.85,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="immersiveengineering"
type="required"
reason="Immersive Deposit Scanner reads Immersive Engineering core samples."
versionRange="[12.4.2-194,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="immersivepetroleum"
type="required"
reason="Immersive Deposit Scanner reads Immersive Petroleum reservoir survey data."
versionRange="[4.4.1-37,)"
ordering="AFTER"
side="BOTH"

